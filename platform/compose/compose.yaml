services:
  postgres:
    image: postgres:16-alpine
    container_name: accesshub-identity-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-accesshub_identity}
      POSTGRES_USER: ${POSTGRES_USER:-accesshub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - accesshub_identity_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: accesshub-identity-api:local
    build:
      context: ../..
      dockerfile: platform/docker/Dockerfile
    container_name: accesshub-identity-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      Database__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB:-accesshub_identity};Username=${POSTGRES_USER:-accesshub};Password=${POSTGRES_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER:-AccessHub.Identity}
      Jwt__Audience: ${JWT_AUDIENCE:-AccessHub.Identity.Clients}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?JWT_SIGNING_KEY is required}
      Jwt__AccessTokenLifetimeMinutes: ${JWT_ACCESS_TOKEN_LIFETIME_MINUTES:-15}
      Jwt__RefreshTokenLifetimeDays: ${JWT_REFRESH_TOKEN_LIFETIME_DAYS:-7}
    ports:
      - "${API_PORT:-5080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  accesshub_identity_postgres_data:
